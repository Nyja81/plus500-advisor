<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>+500 Advisor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--card:#111827;--card2:#1a2332;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;
  --text:#e2e8f0;--muted:#94a3b8;--border:#1e293b;
  --glass:rgba(255,255,255,0.05);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  overflow-x:hidden;
}
.loader{
  position:fixed;inset:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .3s;
}
.loader.hide{opacity:0;pointer-events:none}
.loader .spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{margin-top:12px;font-size:13px;color:var(--muted)}

.top-bar{
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
}
.top-bar .title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.top-bar .meta{font-size:11px;color:var(--muted);display:flex;gap:10px;align-items:center}
.top-bar .live{color:var(--green)}

.cards{padding:12px 12px 140px}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;margin-bottom:12px;overflow:hidden;
  backdrop-filter:blur(8px);
}
.card-header{
  padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;
}
.card-header .inst{font-size:15px;font-weight:700}
.card-header .price{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
.card-header .change{font-size:12px;margin-left:8px}

.recommendation{
  padding:10px 16px;margin:0 12px;border-radius:10px;
  text-align:center;font-weight:700;font-size:16px;
  letter-spacing:.3px;
}
.rec-buy{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.rec-sell{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.rec-hold{background:rgba(234,179,8,.1);color:var(--yellow);border:1px solid rgba(234,179,8,.2)}

.confidence{
  text-align:center;padding:4px 16px 8px;font-size:11px;color:var(--muted)
}

.details{padding:8px 16px 14px}
.detail-row{
  display:flex;justify-content:space-between;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;
}
.detail-row:last-child{border:none}
.detail-row .label{color:var(--muted)}
.detail-row .value{font-weight:600;font-variant-numeric:tabular-nums}
.detail-row .value.up{color:var(--green)}
.detail-row .value.down{color:var(--red)}
.detail-row .value.neutral{color:var(--yellow)}

.comment{
  padding:8px 12px;margin:6px 12px 10px;
  background:var(--glass);border-radius:8px;border-left:3px solid var(--blue);
  font-size:11px;line-height:1.5;color:var(--muted);
}
.comment strong{color:var(--text)}

.section-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--muted);padding:16px 16px 6px;
}

.correlation-card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:14px;margin:12px;padding:14px 16px;
}
.correlation-card h3{font-size:13px;font-weight:700;margin-bottom:8px}
.corr-row{
  display:flex;justify-content:space-between;padding:4px 0;
  font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);
}
.corr-row:last-child{border:none}
.corr-badge{
  display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;
}
.corr-badge.weak{background:rgba(234,179,8,.15);color:var(--yellow)}
.corr-badge.none{background:rgba(148,163,184,.1);color:var(--muted)}
.corr-badge.moderate{background:rgba(59,130,246,.15);color:var(--blue)}

.params{
  padding:8px 12px;margin:0 12px 10px;
  background:rgba(59,130,246,.06);border-radius:8px;border:1px solid rgba(59,130,246,.15);
}
.params p{font-size:11px;color:var(--muted);line-height:1.6}
.params strong{color:var(--text)}

.footer{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:linear-gradient(0deg,var(--bg) 80%,transparent);
  padding:20px 16px 8px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
}
.footer .push-bar{
  display:flex;gap:8px;justify-content:center;align-items:center;
  padding:8px 12px;margin-bottom:8px;
  background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);
  border-radius:10px;
}
.footer .push-bar button{
  padding:8px 16px;border-radius:8px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;
}
.push-btn-on{background:var(--green);color:#000}
.push-btn-off{background:var(--red);color:#fff}
.footer .push-bar .status{font-size:11px;color:var(--muted)}
.footer .refresh-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;font-size:14px;font-weight:700;cursor:pointer;
  letter-spacing:.3px;
}
.footer .refresh-btn:active{transform:scale(.98);opacity:.9}
.footer .ts{font-size:10px;color:var(--muted);margin-top:6px;text-align:center}

.alert-toast{
  position:fixed;top:60px;left:12px;right:12px;z-index:200;
  background:linear-gradient(135deg,#1e293b,#0f172a);
  border:1px solid var(--blue);border-radius:12px;
  padding:14px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;opacity:0;transform:translateY(-20px);
  transition:opacity .3s ease,transform .3s ease;
}
.alert-toast.show{display:block;opacity:1;transform:translateY(0)}
.alert-toast .alert-title{font-size:13px;font-weight:700;color:var(--text)}
.alert-toast .alert-body{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.alert-toast .alert-close{
  position:absolute;top:8px;right:12px;background:none;border:none;
  color:var(--muted);font-size:16px;cursor:pointer;
}

@media(prefers-color-scheme:light){
  :root{
    --bg:#f8fafc;--card:#ffffff;--card2:#f1f5f9;
    --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
    --glass:rgba(0,0,0,0.03);
  }
}
</style>
</head>
<body>
<div class="alert-toast" id="alertToast">
  <button class="alert-close" onclick="hideAlert()">&times;</button>
  <div class="alert-title" id="alertTitle"></div>
  <div class="alert-body" id="alertBody"></div>
</div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <p id="loadStatus">Pobieram dane rynkowe...</p>
</div>

<div class="top-bar">
  <span class="title">+500 Advisor</span>
  <div class="meta">
    <span id="datetime"></span>
    <span class="live" id="liveStatus">Aktualizacja...</span>
  </div>
</div>

<div class="cards" id="cards"></div>

<div class="footer">
  <div class="push-bar" id="pushBar" style="display:none">
    <span class="status" id="pushStatus">Alerty push wylaczone</span>
    <button id="pushBtn" class="push-btn-on" onclick="togglePush()">Wlacz alerty</button>
  </div>
  <button class="refresh-btn" onclick="refresh()">Odswież dane</button>
  <div class="ts" id="lastUpdate"></div>
</div>

<script>
// ============================================================
// KONFIGURACJA FUNDAMENTALNA
// ============================================================
const FUNDAMENTALS = {
  WTI: {
    name: 'Ropa WTI', symbol: 'CL=F', unit: 'USD/bbl',
    floor: 50, fairLow: 58, fairMid: 65, fairHigh: 75, ceiling: 90, extreme: 110,
  },
  NG: {
    name: 'Gaz ziemny', symbol: 'NG=F', unit: 'USD/MMBtu',
    floor: 1.80, fairLow: 2.50, fairMid: 3.50, fairHigh: 4.50, ceiling: 6.00, extreme: 8.00,
    seasonality: {1:1.25,2:1.20,3:1.05,4:0.85,5:0.80,6:0.80,7:0.85,8:0.90,9:0.95,10:1.00,11:1.10,12:1.20},
  },
  EUA: {
    name: 'Emisje CO2 (EUA)', symbol: 'KRBN', unit: 'EUR/t (proxy)',
    floor: 45, fairLow: 55, fairMid: 70, fairHigh: 85, ceiling: 100, extreme: 130,
    krbnRatio: 2.27,
  },
  ALU: {
    name: 'Aluminium', symbol: 'ALI=F', unit: 'USD/t',
    floor: 1800, fairLow: 2100, fairMid: 2400, fairHigh: 2700, ceiling: 3100, extreme: 3600,
    lmeMultiplier: 1,
  },
};

const STRATEGY = {
  WTI: { greenH:[0,1,9,10,11,13,15,16,17,18,19,21], redH:[14,22,23], greenD:[0,1,3,4], redD:[2,6] },
  NG:  { greenH:[0,7,8,9,10,12,14,15,16,18,19,20,22,23], redH:[13,21], greenD:[0,1,2,3,4], redD:[6] },
  EUA: { greenH:[8,9,10,11,12,14,16,17], redH:[13,15], greenD:[1,2,4], redD:[] },
  ALU: { greenH:[8,9,10,11,12,15,16,17], redH:[14,22,23], greenD:[0,1,2,3,4], redD:[6], bias:'short' },
};

const DAYS = ['Niedziela','Poniedzialek','Wtorek','Sroda','Czwartek','Piatek','Sobota'];
const MONTHS = ['','Sty','Lut','Mar','Kwi','Maj','Cze','Lip','Sie','Wrz','Paz','Lis','Gru'];

// ============================================================
// POBIERANIE DANYCH Z YAHOO FINANCE (via query proxy)
// ============================================================

async function fetchQuote(symbol) {
  const resp = await fetch(`/api/quote/${symbol}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${symbol}`);
  const json = await resp.json();
  if (json.error) throw new Error(json.error);
  return { closes: json.closes, timestamps: json.timestamps };
}

// ============================================================
// TECHNICZNE WSKAŹNIKI
// ============================================================

function computeTechnicals(closes) {
  const n = closes.length;
  if (n < 30) return null;
  const current = closes[n-1];

  const sma = (arr, period) => {
    const slice = arr.slice(-period);
    return slice.reduce((a,b) => a+b, 0) / slice.length;
  };
  const sma20 = sma(closes, 20);
  const sma50 = n >= 50 ? sma(closes, 50) : sma(closes, n);
  const sma200 = n >= 200 ? sma(closes, 200) : sma(closes, n);

  let gains = 0, losses = 0;
  for (let i = n-14; i < n; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) gains += d; else losses -= d;
  }
  const rs = losses === 0 ? 100 : gains / losses;
  const rsi = 100 - 100 / (1 + rs);

  const tail20 = closes.slice(-20);
  const std20 = Math.sqrt(tail20.reduce((s,v) => s + (v-sma20)**2, 0) / 20);
  const bbUpper = sma20 + 2*std20;
  const bbLower = sma20 - 2*std20;

  const ema = (arr, span) => {
    const k = 2/(span+1);
    let e = arr[0];
    for (let i = 1; i < arr.length; i++) e = arr[i]*k + e*(1-k);
    return e;
  };
  const ema12 = ema(closes.slice(-26), 12);
  const ema26 = ema(closes.slice(-26), 26);
  const macd = ema12 - ema26;

  const pct1d = n >= 2 ? (current/closes[n-2]-1)*100 : 0;
  const pct5d = n >= 6 ? (current/closes[n-6]-1)*100 : 0;
  const pct20d = n >= 21 ? (current/closes[n-21]-1)*100 : 0;

  return { current, sma20, sma50, sma200, rsi, bbUpper, bbLower, macd, pct1d, pct5d, pct20d };
}

// ============================================================
// SCORING (identyczny z backtestem)
// ============================================================

function scoreFundamental(key, price) {
  const f = FUNDAMENTALS[key];
  let fairMid = f.fairMid;
  if (key === 'NG') {
    const m = new Date().getMonth() + 1;
    fairMid *= (f.seasonality[m] || 1);
  }
  if (key === 'EUA' && f.krbnRatio) price *= f.krbnRatio;

  const deviation = (price - fairMid) / fairMid * 100;
  let score, zone;
  if (price <= f.floor) { score = 80; zone = 'PODLOGA'; }
  else if (price <= f.fairLow) { score = 50; zone = 'TANIO'; }
  else if (price <= fairMid) { score = 20; zone = 'Fair value (dolna)'; }
  else if (price <= f.fairHigh) { score = -10; zone = 'Fair value (gorna)'; }
  else if (price <= f.ceiling) { score = -40; zone = 'DROGIE'; }
  else if (price <= f.extreme) { score = -70; zone = 'B. DROGIE'; }
  else { score = -90; zone = 'EKSTREMALNIE DROGIE'; }

  return { score, zone, deviation, fairMid, displayPrice: price };
}

function scoreTechnical(tech) {
  let s = 0;
  const signals = [];

  if (tech.current > tech.sma50 && tech.sma50 > tech.sma200) { s += 20; signals.push('Trend UP'); }
  else if (tech.current < tech.sma50 && tech.sma50 < tech.sma200) { s -= 20; signals.push('Trend DOWN'); }
  else if (tech.current > tech.sma20) { s += 10; signals.push('Krotki trend UP'); }
  else { s -= 10; signals.push('Krotki trend DOWN'); }

  if (tech.rsi > 70) { s -= 25; signals.push(`RSI ${tech.rsi.toFixed(0)} WYKUPIONY`); }
  else if (tech.rsi > 60) { s -= 10; signals.push(`RSI ${tech.rsi.toFixed(0)} bliski wykup.`); }
  else if (tech.rsi < 30) { s += 25; signals.push(`RSI ${tech.rsi.toFixed(0)} WYPRZEDANY`); }
  else if (tech.rsi < 40) { s += 10; signals.push(`RSI ${tech.rsi.toFixed(0)} bliski wyprz.`); }
  else { signals.push(`RSI ${tech.rsi.toFixed(0)}`); }

  if (tech.current >= tech.bbUpper) { s -= 15; signals.push('Przy gornej BB'); }
  else if (tech.current <= tech.bbLower) { s += 15; signals.push('Przy dolnej BB'); }

  if (tech.pct5d > 5) { s -= 10; signals.push(`+${tech.pct5d.toFixed(1)}% 5d`); }
  else if (tech.pct5d < -5) { s += 10; signals.push(`${tech.pct5d.toFixed(1)}% 5d`); }

  return { score: s, signals };
}

function scoreTiming(key) {
  const now = new Date();
  const h = now.getHours(), d = now.getDay();
  const dayIdx = d === 0 ? 6 : d - 1;
  const st = STRATEGY[key];
  let s = 0; const signals = [];

  if (st.greenH.includes(h)) { s += 15; signals.push(`${h}:00 ZIELONA`); }
  else if (st.redH.includes(h)) { s -= 20; signals.push(`${h}:00 CZERWONA`); }

  if (st.greenD.includes(dayIdx)) { s += 10; signals.push(`${DAYS[d]} zielony`); }
  else if (st.redD.includes(dayIdx)) { s -= 15; signals.push(`${DAYS[d]} czerwony`); }

  if (h === 13 || h === 14) { s -= 30; signals.push('13-14:30 BLOKADA US'); }
  return { score: s, signals };
}

function getRecommendation(key, totalScore) {
  const st = STRATEGY[key];
  if (st && st.bias === 'short') {
    totalScore -= 8;
  }
  if (totalScore > 25) return { action: 'KUP', cls: 'rec-buy', conf: Math.min(90, 50+Math.abs(totalScore)) };
  if (totalScore > 10) return { action: 'KUP (ostroznie)', cls: 'rec-buy', conf: Math.min(75, 40+Math.abs(totalScore)) };
  if (totalScore < -25) return { action: 'SPRZEDAJ', cls: 'rec-sell', conf: Math.min(90, 50+Math.abs(totalScore)) };
  if (totalScore < -10) return { action: 'SPRZEDAJ (ostroznie)', cls: 'rec-sell', conf: Math.min(75, 40+Math.abs(totalScore)) };
  return { action: 'WSTRZYMAJ SIE', cls: 'rec-hold', conf: Math.max(40, 60-Math.abs(totalScore)*2) };
}

// ============================================================
// KOMENTARZE KONTEKSTOWE
// ============================================================

function getComment(key, fund, tech, timing, techRaw) {
  const lines = [];

  if (key === 'WTI') {
    if (fund.displayPrice > 90) lines.push(`<strong>Ropa ${fund.displayPrice.toFixed(0)} USD = ${(fund.deviation).toFixed(0)}% powyzej fair value.</strong> Premia geopolityczna ~${Math.max(0,fund.displayPrice-75).toFixed(0)} USD (Iran/OPEC/Trump). Mean reversion: musi spasc do 58-75.`);
    else if (fund.displayPrice < 58) lines.push(`<strong>Ropa ponizej kosztow produkcji.</strong> Historycznie to dno — producenci zaczynaja ciac wydobycie.`);
  }
  if (key === 'NG') {
    const m = new Date().getMonth() + 1;
    if (m >= 4 && m <= 6) lines.push(`Sezonowy dolek (kwiecien-czerwiec). Historycznie najnizsze ceny roku.`);
    if (m >= 11 || m <= 2) lines.push(`Sezon grzewczy — ceny powinny byc podwyzszone.`);
    if (fund.displayPrice < 2.5) lines.push(`<strong>Blisko strukturalnego floor (2.50).</strong> LNG eksport + breakeven Haynesville = podpora.`);
  }
  if (key === 'EUA') {
    lines.push(`Presja polityczna: 10 panstw chce rewizji ETS. Kluczowe: kwiecien (MSR), lipiec (ETS Directive).`);
    if (fund.displayPrice < 60) lines.push(`<strong>Ponizej 60 EUR — tanio.</strong> Lato 2026: koniec REPowerEU aukcji = spadek podazy 40%.`);
  }
  if (key === 'ALU') {
    if (fund.displayPrice > 2700) lines.push(`<strong>Aluminium ${fund.displayPrice.toFixed(0)} USD/t — powyzej fair value.</strong> Szukaj shorta przy oporach. Chiny moga zwolnic — nadprodukcja hutnicza.`);
    else if (fund.displayPrice < 2100) lines.push(`<strong>Aluminium tanio (${fund.displayPrice.toFixed(0)} USD/t).</strong> Koszty energii podpieraja cene — huty zamykaja sie ponizej 2000.`);
    else lines.push(`Aluminium w strefie fair value. Kluczowe: zapasy LME, popyt z Chin (60% globalnego), koszty energii (30-40% kosztow produkcji).`);

    if (techRaw) {
      const inSmaRange = techRaw.current >= Math.min(techRaw.sma50, techRaw.sma200) * 0.97 &&
                          techRaw.current <= Math.max(techRaw.sma50, techRaw.sma200) * 1.03;
      if (inSmaRange) {
        lines.push(`<strong>Cena w zakresie SMA 50/200 — trzymaj pozycje.</strong> Przetrzymaj jesli masz bledna strone.`);
      } else if (techRaw.current > techRaw.sma50 && techRaw.current > techRaw.sma200) {
        lines.push(`Cena powyzej SMA 50 i 200 — bias SHORT. Szukaj wejsc na oporach.`);
      } else if (techRaw.current < techRaw.sma50 && techRaw.current < techRaw.sma200) {
        lines.push(`Cena ponizej SMA 50 i 200 — ostroznosc z shortem. Rozważ cofniecie do SMA jako wejscie.`);
      }
    }

    lines.push('');
    lines.push(`Drivers: cla importowe US/EU na aluminium chinskie, zapasy LME, ceny pradu w Europie, popyt z sektora EV/budowlanego.`);
  }

  lines.push('');
  if (key === 'WTI') lines.push(`Korelacja z gazem: slaba (+0.09). Rozbieznosc ropa/gaz zdarza sie w 43% duzych ruchow.`);
  if (key === 'NG') lines.push(`Korelacja z ropa: slaba (+0.09). Gaz jest bardziej sezonowy i pogodowy niz ropa.`);
  if (key === 'EUA') lines.push(`Korelacja z energia: minimalna (+0.07 z ropa, +0.01 z gazem). EUA to glownie regulacje UE.`);
  if (key === 'ALU') lines.push(`Korelacja z miedzia: umiarkowana (~0.45). Z ropa: slaba (~0.15). Aluminium bardziej reaguje na Chiny niz na OPEC.`);

  lines.push('');
  const confLevel = Math.abs(fund.score) > 50 ? 'WYSOKA' : Math.abs(fund.score) > 20 ? 'SREDNIA' : 'NISKA';
  lines.push(`<strong>Wiarygodnosc rekomendacji: ${confLevel}.</strong> Fundament ${confLevel === 'WYSOKA' ? 'silny sygnal' : confLevel === 'SREDNIA' ? 'umiarkowany' : 'brak wyraznego sygnalu'}, tech ${Math.abs(tech.score) > 20 ? 'potwierdza' : 'neutralne'}.`);

  return lines.filter(l => l).join('<br>');
}

// ============================================================
// RENDER
// ============================================================

function renderCard(key, data) {
  const f = FUNDAMENTALS[key];
  const tech = computeTechnicals(data.closes);
  if (!tech) return '';

  const fund = scoreFundamental(key, tech.current);
  const techScore = scoreTechnical(tech);
  const timeScore = scoreTiming(key);
  const total = fund.score * 0.5 + techScore.score * 0.3 + timeScore.score * 0.2;
  const rec = getRecommendation(key, total);
  const comment = getComment(key, fund, techScore, timeScore, tech);

  const price = key === 'EUA' ? (tech.current * f.krbnRatio).toFixed(2) : tech.current.toFixed(2);
  const unit = key === 'EUA' ? 'EUR' : 'USD';
  const chgCls = tech.pct1d >= 0 ? 'up' : 'down';
  const chgSign = tech.pct1d >= 0 ? '+' : '';

  const holdTime = key === 'EUA' ? '3-7 dni' : key === 'NG' ? '8-24h / do 7 dni' : key === 'ALU' ? '4-48h / do 5 dni' : '8-24h / max 3 dni';
  const biasNote = key === 'ALU' ? ' | Bias: SHORT' : '';

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="inst">${f.name}</div>

      <div class="detail-row"><span class="label">Zmiana 5d</span><span class="value ${tech.pct5d >= 0 ? 'up' : 'down'}">${tech.pct5d >= 0 ? '+' : ''}${tech.pct5d.toFixed(1)}%</span></div>
      <div class="detail-row"><span class="label">Zmiana 20d</span><span class="value ${tech.pct20d >= 0 ? 'up' : 'down'}">${tech.pct20d >= 0 ? '+' : ''}${tech.pct20d.toFixed(1)}%</span></div>
    </div>

    <div class="comment">${comment}</div>

    <div class="params">
      <p><strong>Jesli otwierasz:</strong> Pozycja 10-20k | SL max -3 000 zl | Hold: ${holdTime}${biasNote}</p>

  </div>`;
}

let marketData = {};

async function refresh() {
  const loader = document.getElementById('loader');
  const loadStatus = document.getElementById('loadStatus');
  loader.classList.remove('hide');

  const symbols = ['CL=F', 'NG=F', 'KRBN', 'ALI=F'];
  const keys = ['WTI', 'NG', 'EUA', 'ALU'];

  for (let i = 0; i < symbols.length; i++) {
    loadStatus.textContent = `Pobieram ${FUNDAMENTALS[keys[i]].name}... (${i+1}/${symbols.length})`;
    try {
      marketData[keys[i]] = await fetchQuote(symbols[i]);
    } catch(e) {
      console.error(`Error fetching ${symbols[i]}:`, e);
      loadStatus.textContent = `Blad: ${symbols[i]} — ${e.message}. Probuje ponownie...`;
      try {
        await new Promise(r => setTimeout(r, 2000));
        marketData[keys[i]] = await fetchQuote(symbols[i]);
      } catch(e2) {
        console.error(`Retry failed for ${symbols[i]}`);
      }
    }
  }

  const now = new Date();
  document.getElementById('datetime').textContent =
    `${now.toLocaleDateString('pl-PL')} ${now.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})} (${DAYS[now.getDay()]})`;
  document.getElementById('liveStatus').textContent = 'Dane aktualne';
  document.getElementById('lastUpdate').textContent = `Ostatnia aktualizacja: ${now.toLocaleTimeString('pl-PL')}`;

  let html = '';
  for (const key of keys) {
    if (marketData[key]) {
      html += renderCard(key, marketData[key]);
    }
  }
  html += renderCorrelations();

  html += `<div style="padding:16px;font-size:10px;color:var(--muted);text-align:center;line-height:1.5">
    Wsparcie decyzyjne, nie gwarancja zysku. Model oparty na mean reversion + techniczne.
    Fundament ma 50% wagi, tech 30%, timing 20%. Zawsze ustawiaj STOP-LOSS.
  </div>`;

  document.getElementById('cards').innerHTML = html;
  loader.classList.add('hide');
}

const VAPID_PUBLIC_KEY = 'BEhZASbrBMr2L10GVjnc19w5TDULVWa9sXfKlPrt1GeVKHdcz5aCOjGLe0WOZIt0ScRKaK79azbnXJCDcFqVDtk';
let swRegistration = null;
let pushSubscription = null;
let previousRecs = {};

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.value = 0.3;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function showAlert(title, body) {
  const toast = document.getElementById('alertToast');
  document.getElementById('alertTitle').textContent = title;
  document.getElementById('alertBody').textContent = body;
  toast.style.display = 'block';
  requestAnimationFrame(() => toast.classList.add('show'));
  playAlertSound();
  setTimeout(hideAlert, 8000);
}

function hideAlert() {
  const toast = document.getElementById('alertToast');
  toast.classList.remove('show');
  setTimeout(() => { if (!toast.classList.contains('show')) toast.style.display = 'none'; }, 300);
}

function checkForChanges(key, rec) {
  const prev = previousRecs[key];
  if (!prev) { previousRecs[key] = rec.action; return; }
  if (prev !== rec.action) {
    const dirChange = (prev.includes('KUP') && rec.action.includes('SPRZEDAJ')) ||
                      (prev.includes('SPRZEDAJ') && rec.action.includes('KUP'));
    if (dirChange) {
      showAlert(
        `${FUNDAMENTALS[key].name}: ODWROCENIE TRENDU`,
        `${prev} → ${rec.action} — sprawdz pozycje!`
      );
    } else if (prev !== rec.action) {
      showAlert(
        `${FUNDAMENTALS[key].name}: zmiana`,
        `${prev} → ${rec.action}`
      );
    }
  }
  previousRecs[key] = rec.action;
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function initPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    swRegistration = await navigator.serviceWorker.register('sw.js');
    await navigator.serviceWorker.ready;
    pushSubscription = await swRegistration.pushManager.getSubscription();
    updatePushUI();
    document.getElementById('pushBar').style.display = 'flex';
  } catch(e) {
    console.error('Push init error:', e);
  }
}

function updatePushUI() {
  const btn = document.getElementById('pushBtn');
  const status = document.getElementById('pushStatus');
  if (pushSubscription) {
    btn.textContent = 'Wyłącz alerty';
    btn.className = 'push-btn-off';
    status.textContent = 'Alerty push aktywne';
    status.style.color = 'var(--green)';
  } else {
    btn.textContent = 'Włącz alerty';
    btn.className = 'push-btn-on';
    status.textContent = 'Alerty push wyłączone';
    status.style.color = 'var(--muted)';
  }
}

async function togglePush() {
  if (pushSubscription) {
    try {
      await fetch('/api/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription: pushSubscription.toJSON(), action: 'unsubscribe' }),
      });
      await pushSubscription.unsubscribe();
      pushSubscription = null;
      updatePushUI();
    } catch(e) { console.error('Unsubscribe error:', e); }
  } else {
    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        showAlert('Brak uprawnień', 'Musisz zezwolić na powiadomienia w ustawieniach przeglądarki');
        return;
      }
      pushSubscription = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
      await fetch('/api/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription: pushSubscription.toJSON() }),
      });
      updatePushUI();
      showAlert('Alerty włączone', 'Dostaniesz powiadomienie push gdy trend się odwróci');
    } catch(e) {
      console.error('Subscribe error:', e);
      showAlert('Błąd', e.message);
    }
  }
}

const _origRenderCard = renderCard;
renderCard = function(key, data) {
  const f = FUNDAMENTALS[key];
  const tech = computeTechnicals(data.closes);
  if (tech) {
    const fund = scoreFundamental(key, tech.current);
    const techScore = scoreTechnical(tech);
    const timeScore = scoreTiming(key);
    const total = fund.score * 0.5 + techScore.score * 0.3 + timeScore.score * 0.2;
    const rec = getRecommendation(key, total);
    checkForChanges(key, rec);
  }
  return _origRenderCard(key, data);
};

initPush();
refresh();
setInterval(refresh, 60000);
